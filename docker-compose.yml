version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: flight-analytics-backend
    ports:
      - "8000:8000"
    volumes:
      - ./rule_labelled.csv:/app/rule_labelled.csv:ro
    environment:
      - PYTHONUNBUFFERED=1
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - flight-analytics

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: flight-analytics-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - flight-analytics

networks:
  flight-analytics:
    driver: bridge
