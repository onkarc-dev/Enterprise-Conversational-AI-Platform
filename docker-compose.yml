version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: flight-analytics-backend
    ports:
      - "5000:5000"
    volumes:
      - ./rule_labelled.csv:/app/rule_labelled.csv
      - ./uploads:/app/uploads
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - HF_TOKEN=${HF_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - flight-analytics

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: flight-analytics-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - flight-analytics

networks:
  flight-analytics:
    driver: bridge
